name: Daily Global News Generator

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests pytz playwright openai
          python -m playwright install --with-deps chromium

      - name: Run news generator
        env:
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
        run: python aggregate_news.py

      - name: Commit and push generated files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add *.md *.json assets/generated
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto-generate daily global news" && git push)
